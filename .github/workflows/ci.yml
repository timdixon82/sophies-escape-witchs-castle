# Continuous integration.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-21. The version tag is shown in the trailing comment. To
# update an action, change the SHA and the comment together.
#
# This is a stack-aware scaffold. Uncomment and adapt the block for the
# project's stack: a static front-end, PHP with MariaDB, or WordPress.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
