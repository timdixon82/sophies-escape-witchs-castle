# Release automation with release-please.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-21. The version tag is in the trailing comment.

name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Deploy step: this is a stub. Fill it in with the project's hosting
      # target. GitHub Pages for a static project; the Amazon Web Services
      # Lightsail virtual private server running Virtualmin for a PHP and
      # MariaDB project. Deploy only when release-please has created a
      # release.
