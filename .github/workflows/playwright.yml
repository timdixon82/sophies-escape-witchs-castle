# Playwright functional and visual regression tests.
#
# This is an opt-in scaffold. The steps below are commented out because a
# freshly scaffolded project has no Playwright tests yet. Enabling this
# workflow before tests exist would produce a red or empty CI job on every
# pull request, which is the opposite of the quality goal.
#
# To enable this workflow for a project:
#   1. Write at least one Playwright test in your project (e.g. tests/e2e/).
#   2. Uncomment the steps below.
#   3. Replace the placeholder test command with your project's actual command.
#   4. Commit the updated workflow.
#
# This workflow is gated to code-type projects. Documentation-type projects
# do not receive this file during sync.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-06-02. The version tag is shown in the trailing comment. To
# update an action, change the SHA and the comment together.
#
# Relationship to accessibility.yml: this workflow covers functional flows
# and visual regression. accessibility.yml covers WCAG conformance via
# Pa11y and axe-core. Both serve different layers and must both be green
# before a PR merges.

name: Playwright
on:
  pull_request:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright tests
    runs-on: ubuntu-latest
    steps:
