# Team standard lint gate for pull requests.
#
# Runs on every pull request. Stops bad code before it lands rather than
# blocking a deploy of already-merged code (see Jacob's decision to move
# linting out of deploy.yml and onto pull_request).
#
# Reference implementation: Image Colour Contrast Checker deploy.yml lint job,
# which runs npm run lint:html, npm run lint:css, and npm run lint:js.
#
# Replace the npm run lint placeholder in the "Lint" step below with the
# actual lint commands for this project. Common examples:
#   npm run lint:html
#   npm run lint:css
#   npm run lint:js
#
# The npm steps are gated on a root package.json, so a static-content
# project (no manifest, no build) does not fail this workflow for lacking
# one. That archetype instead gets an HTML/CSS-validation-only path, using
# a pinned tool manifest at .github/lint-tools/package.json — the same
# pattern accessibility.yml uses for its accessibility tools — so
# Dependabot can still track and bump the validators' versions.
#
# A project whose .github/ci-archetype declares python-tool has no HTML,
# CSS, or JavaScript package manifest at all, so both the npm steps and the
# static-content HTML/CSS validation path are skipped for it. There is no
# established Python lint standard on this team yet (no ruff/flake8
# configuration convention), so this is an honest, visible gap rather than
# a silently weakened gate: a log-only step below says so plainly. See
# jacob-ci-archetypes.md and docs/decisions/001-python-tool-ci-archetype.md
# in Lire RSS Hermes, where this archetype was first introduced.
#
# Action versions are pinned to commit SHAs verified on 2026-05-21. The
# version tag is shown in the trailing comment. Update the SHA and the
# comment together when upgrading an action.

name: Lint

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for a python-tool archetype declaration
        # Reads .github/ci-archetype, trimmed of surrounding whitespace and
        # newlines, mirroring the equivalent step in ci.yml and
        # accessibility.yml. A python-tool project has no HTML, CSS, or
        # JavaScript package manifest at all, so the Node.js setup and every
        # validation step below are skipped for it.
        id: archetype
        run: |
          if [ -f .github/ci-archetype ]; then
            value=$(tr -d '[:space:]' < .github/ci-archetype)
          else
            value=""
          fi
          if [ "$value" = "python-tool" ]; then
            echo "is_python_tool=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_python_tool=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.archetype.outputs.is_python_tool != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: .github/lint-tools/package-lock.json

      - name: Install dependencies
        if: steps.archetype.outputs.is_python_tool != 'true' && hashFiles('package.json') != ''
        run: npm ci

      - name: Lint
        # Replace with your project's lint command(s). Common examples:
        # npm run lint:html, npm run lint:css, npm run lint:js.
        if: steps.archetype.outputs.is_python_tool != 'true' && hashFiles('package.json') != ''
        run: npm run lint

      # --- static-content archetype: no package.json, so validate markup
      # and styles directly, using the pinned tool manifest below instead
      # of an application manifest that does not otherwise exist. ---
      - name: Install HTML/CSS validation tools (static-content)
        if: steps.archetype.outputs.is_python_tool != 'true' && hashFiles('package.json') == ''
        run: npm ci
        working-directory: .github/lint-tools

      - name: Add validation tools to PATH
        if: steps.archetype.outputs.is_python_tool != 'true' && hashFiles('package.json') == ''
        run: echo "$GITHUB_WORKSPACE/.github/lint-tools/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Validate HTML (static-content)
        if: steps.archetype.outputs.is_python_tool != 'true' && hashFiles('package.json') == ''
        run: |
          find . -name '*.html' -not -path './.git/*' -not -path './.github/*' -not -path './node_modules/*' -print0 \
            | xargs -0 --no-run-if-empty html-validate --config .github/lint-tools/.htmlvalidate.json

      - name: Validate CSS (static-content)
        if: steps.archetype.outputs.is_python_tool != 'true' && hashFiles('package.json') == ''
        run: |
          find . -name '*.css' -not -path './.git/*' -not -path './.github/*' -not -path './node_modules/*' -print0 \
            | xargs -0 --no-run-if-empty stylelint --config .github/lint-tools/.stylelintrc.json

      - name: Note that no Python lint standard exists yet (python-tool)
        # Non-blocking, log-only. This is an honest, visible gap, not a
        # silently weakened gate: unlike the browser-extension archetype's
        # accessibility gate, which moves to a real alternate check
        # (Playwright), there is currently no equivalent home for
        # Python-specific linting (for example ruff or flake8) in this
        # project's or the team's stack standards.
        if: steps.archetype.outputs.is_python_tool == 'true'
        run: |
          echo "This project's .github/ci-archetype declares python-tool."
          echo "There is no Python-specific lint standard on this team yet"
          echo "(no ruff/flake8 configuration convention), so this job is a"
          echo "deliberate no-op for this archetype. This is a known gap,"
          echo "not a hidden one; see docs/coding-standards.md for the"
          echo "team's current per-stack lint coverage."
