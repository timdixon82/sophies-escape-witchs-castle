# Accessibility checks: axe-core and Pa11y at WCAG 2.2 AAA.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-21. The version tag is in the trailing comment.
#
# The site must be built or served before the tools run. Adapt the serve
# step and the URL to the project's stack.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
      - name: Install the accessibility tools
        run: npm install -g pa11y @axe-core/cli
      - name: Serve the site
        run: 'echo "Adapt: start the site on http://localhost:8080"'
      - name: Pa11y at WCAG 2.2 AAA
        run: pa11y --standard WCAG2AAA "http://localhost:8080"
      - name: axe-core at WCAG 2.2 AAA
        run: axe "http://localhost:8080" --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa
