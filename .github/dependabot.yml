# Dependabot configuration.
# Weekly, grouped dependency updates. A scaffolded project should remove
# any ecosystem it does not use, so Dependabot does not warn about a
# missing manifest.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      php:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      javascript:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /.github/accessibility-tools
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      accessibility-tools:
        patterns: ["*"]
