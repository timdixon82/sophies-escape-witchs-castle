name: Bug report
description: Report something that is not working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What is wrong
      description: What happened, and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How to make the problem happen again.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, screen reader, and operating system.
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility impact
      description: Does this bug affect screen reader or keyboard use? Describe how.
